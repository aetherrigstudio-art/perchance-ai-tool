<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Primordial — Audio Instrument</title>
  <link rel="stylesheet" href="./src/ui/styles.css" />
</head>
<body>
  <div id="stage">
    <canvas id="glcanvas"></canvas>

    <!-- HUD overlay frame -->
    <div id="hud">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="title">PRIMORDIAL</div>
      <div id="readout">FPS --  --ms</div>
    </div>

    <!-- Controls panel (built by controls.js) -->
    <div id="panel"></div>

    <!-- Start gate: tap to grant mic + resume AudioContext -->
    <div id="gate">
      <h1>Primordial Studio</h1>
      <p>An audio-reactive visual instrument. Tap start to grant microphone access so live sound drives the slime. The visuals also run without a mic.</p>
      <button id="startBtn" class="btn primary" type="button">Start with Mic</button>
      <button id="skipBtn" class="btn" type="button">Visuals Only</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
